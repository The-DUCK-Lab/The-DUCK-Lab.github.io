<footer>
  <div class="container footer-inner">
    <div class="footer-brand">
      <img src="{{ '/images/logo.png' | relative_url }}" class="logo-mark" alt="DUCK Lab logo" height="50">
      <span>DUCK <em>Lab</em></span>
    </div>

    {% if site.links %}
      <div class="footer-social" aria-label="Social links">
        {% for link in site.links %}
          {% assign key = link[0] %}
          {% assign value = link[1] %}
          {% include button.html type=key text="" link=value style="bare" %}
        {% endfor %}
      </div>
    {% endif %}

    <div class="footer-note">
      &copy; {{ site.time | date: "%Y" }} {{ site.title }} &middot; Imperial College London
    </div>
  </div>
</footer>
